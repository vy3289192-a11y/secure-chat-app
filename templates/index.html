<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Secure Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            /* Ultra Premium OLED Dark Palette */
            --bg-base: #000000;
            --bg-panel: #0f0f11;
            --bg-hover: #1a1a1d;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent: #10b981; /* Premium Emerald Green */
            --accent-glow: rgba(16, 185, 129, 0.25);
            --border: rgba(255, 255, 255, 0.06);
            --msg-mine-bg: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --msg-mine-text: #ffffff;
            --msg-friend-bg: #1c1c1f;
            --msg-friend-text: #f5f5f7;
            --glass-bg: rgba(15, 15, 17, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
        
        body { margin: 0; display: flex; height: 100vh; height: 100dvh; background: var(--bg-base); color: var(--text-main); overflow: hidden; position: relative; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        /* ================= MAIN SCREEN (CHATS LIST) ================= */
        #main-screen { width: 100%; height: 100%; display: flex; flex-direction: column; background: var(--bg-panel); position: relative; z-index: 10; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        
        .wa-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: var(--bg-panel); flex-shrink: 0; border-bottom: 1px solid var(--border);}
        .wa-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
        .wa-header-icons { display: flex; gap: 22px; color: var(--text-main); font-size: 18px; cursor: pointer; align-items: center;}
        .icon-btn { transition: transform 0.2s; }
        .icon-btn:hover { transform: scale(1.1); color: var(--accent); }
        
        .wa-search-container { padding: 15px 20px; background: var(--bg-panel); flex-shrink: 0;}
        .wa-search-box { display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 10px 15px; border: 1px solid var(--border); transition: 0.3s;}
        .wa-search-box:focus-within { border-color: var(--accent); background: rgba(16,185,129,0.05); box-shadow: 0 0 0 3px var(--accent-glow);}
        .wa-search-box span { color: var(--text-muted); font-size: 14px; margin-right: 12px; }
        .wa-search-box input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 14px; outline: none; }
        .wa-search-box input::placeholder { color: var(--text-muted); }

        #content-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 75px; overscroll-behavior-y: contain;}
        
        .list-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 15px 20px 8px 20px; font-weight: 600;}
        
        .wa-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; transition: 0.2s; position: relative;}
        .wa-item:hover { background: var(--bg-hover); }
        .wa-item.active-chat { background: rgba(16, 185, 129, 0.1); }
        .wa-item.active-chat::before { content: ''; position: absolute; left: 0; top: 10%; height: 80%; width: 4px; background: var(--accent); border-radius: 0 4px 4px 0; }
        
        .wa-avatar { width: 50px; height: 50px; border-radius: 16px; background: #2c2c2e; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: 500; color: white; margin-right: 15px; flex-shrink: 0; background-size: cover; background-position: center; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
        .wa-item-details { flex: 1; border-bottom: 1px solid var(--border); padding-bottom: 12px; display: flex; flex-direction: column; justify-content: center; }
        .wa-item:last-child .wa-item-details { border-bottom: none; }
        
        .wa-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .wa-name { font-size: 16px; font-weight: 500; color: var(--text-main); }
        .wa-time { font-size: 12px; color: var(--accent); font-weight: 500;}
        .wa-last-msg { font-size: 13px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        
        .status-dot { width: 14px; height: 14px; border-radius: 50%; background: #555; position: absolute; bottom: -2px; right: -2px; border: 3px solid var(--bg-panel); transition: 0.3s;}
        .online { background: var(--accent); }

        .req-btn { background: var(--accent); color: white; border: none; padding: 6px 16px; border-radius: 8px; font-weight: 600; font-size: 12px; cursor: pointer; transition: 0.2s;}
        .req-btn:hover { background: #059669; }

        #coming-soon-view { display: none; flex: 1; justify-content: center; align-items: center; flex-direction: column; color: var(--text-muted); }
        #coming-soon-view h3 { color: var(--text-main); margin-bottom: 10px; font-size: 20px;}

        /* Premium Floating Action Button */
        .fab { position: absolute; bottom: 85px; right: 20px; width: 56px; height: 56px; background: var(--msg-mine-bg); border-radius: 18px; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 20px var(--accent-glow); cursor: pointer; z-index: 20; transition: 0.3s; }
        .fab:hover { transform: translateY(-3px); box-shadow: 0 12px 25px var(--accent-glow); }
        .fab:active { transform: scale(0.95); }
        .fab span { font-size: 24px; color: white; }

        #bottom-nav { display: flex; justify-content: space-around; align-items: center; background: var(--glass-bg); backdrop-filter: blur(15px); border-top: 1px solid var(--border); position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; z-index: 20; padding: 0 10px; flex-shrink: 0;}
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); cursor: pointer; width: 25%; transition: 0.3s;}
        .nav-icon { font-size: 22px; margin-bottom: 4px; transition: 0.3s; }
        .nav-text { font-size: 11px; font-weight: 500; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active .nav-icon { transform: translateY(-2px); }


        /* ================= CHAT SCREEN ================= */
        #chat-screen { width: 100%; position: fixed; top: 0; bottom: 0; left: 0; background: var(--bg-base); z-index: 50; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; }
        body.chat-active #chat-screen { transform: translateX(0); }
        body.chat-active #main-screen { transform: translateX(-30%); filter: brightness(0.7); }

        .chat-header-bar { display: flex; align-items: center; padding: 12px 20px; background: var(--glass-bg); backdrop-filter: blur(15px); gap: 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;}
        .back-btn { font-size: 22px; color: var(--text-main); cursor: pointer; display: flex; align-items: center;}
        .chat-header-info { flex: 1; display: flex; flex-direction: column; }
        .chat-header-name { font-size: 16px; font-weight: 600; color: var(--text-main); }
        .chat-header-sub { font-size: 12px; color: var(--accent); font-weight: 500;}

        /* Premium Dark Chat Background */
        #messages { flex: 1; flex-basis: 0; padding: 25px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: radial-gradient(circle at center, #111 0%, #000 100%); overscroll-behavior-y: contain;}
        
        .msg { max-width: 75%; padding: 10px 16px; position: relative; word-wrap: break-word; font-size: 14.5px; line-height: 1.5; animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform-origin: bottom; }
        .my-msg { background: var(--msg-mine-bg); color: var(--msg-mine-text); align-self: flex-end; border-radius: 18px 18px 4px 18px; box-shadow: 0 4px 15px var(--accent-glow); transform-origin: bottom right;}
        .friend-msg { background: var(--msg-friend-bg); color: var(--msg-friend-text); align-self: flex-start; border-radius: 18px 18px 18px 4px; border: 1px solid var(--border); transform-origin: bottom left;}
        
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; transition: 0.3s; }
        .msg img:hover { filter: brightness(1.1); }
        .time { font-size: 10px; opacity: 0.7; margin-top: 4px; display: block; text-align: right; float: right; margin-left: 12px;}

        @keyframes popUp { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* Sleek Input Area */
        #input-area { padding: 12px 15px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: var(--glass-bg); backdrop-filter: blur(15px); display: flex; display: none; gap: 12px; align-items: center; flex-shrink: 0; border-top: 1px solid var(--border);}
        .attach-btn { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border); width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; transition: 0.2s;}
        .attach-btn:hover { background: rgba(255,255,255,0.1); }
        #msgInput { flex: 1; padding: 12px 20px; border: 1px solid var(--border); border-radius: 24px; background: rgba(255,255,255,0.03); color: var(--text-main); outline: none; font-size: 15px; transition: 0.3s; }
        #msgInput:focus { border-color: var(--accent); background: rgba(16,185,129,0.03);}
        #sendBtn { background: var(--msg-mine-bg); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 4px 12px var(--accent-glow); transition: 0.2s;}
        #sendBtn:hover { transform: scale(1.05); }

        /* Glassmorphism Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s;}
        .modal-overlay.show { opacity: 1; }
        .modal-box { background: rgba(20, 20, 22, 0.85); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 25px; border-radius: 24px; width: 90%; max-width: 360px; color: var(--text-main); box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(20px); transition: 0.3s;}
        .modal-overlay.show .modal-box { transform: translateY(0); }
        
        .modal-box h3 { margin-bottom: 20px; color: white; font-weight: 600; text-align: center;}
        .modal-box input[type="text"] { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: var(--text-main); font-size: 14px; outline: none; transition: 0.3s;}
        .modal-box input[type="text"]:focus { border-color: var(--accent); }
        .modal-buttons { display: flex; gap: 12px; justify-content: stretch; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; border: none; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-save { background: var(--msg-mine-bg); color: white; box-shadow: 0 4px 15px var(--accent-glow);}
        .btn-save:hover { filter: brightness(1.1); }
        
        #previewImg { max-width: 100%; max-height: 250px; border-radius: 12px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; object-fit: cover;}
        #lightboxImg { max-width: 95%; max-height: 95%; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* Desktop Empty State */
        #desktop-empty { display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-base); color: var(--text-muted); text-align: center; border-left: 1px solid var(--border); }
        .empty-icon { font-size: 60px; margin-bottom: 20px; opacity: 0.5; }
        #desktop-empty h2 { color: var(--text-main); font-weight: 500; margin-bottom: 8px;}
        .badge { background: rgba(16,185,129,0.1); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 20px; border: 1px solid var(--accent-glow);}

        /* ================= DESKTOP FIX (SPLIT SCREEN) ================= */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            #main-screen { width: 380px; flex-shrink: 0; border-right: 1px solid var(--border); }
            body.chat-active #main-screen { transform: none; filter: none; }
            
            #chat-screen { position: relative; flex: 1; transform: translateX(0); z-index: 5; border-left: none; display: flex;}
            .back-btn { display: none !important; }
            
            #desktop-empty { display: flex; }
            body.chat-active #desktop-empty { display: none; }
            
            #chat-header-content { display: none; }
            body.chat-active #chat-header-content { display: flex; width: 100%; align-items: center; gap: 15px; }
            
            /* Hide chat elements when no chat selected */
            #messages, #input-area, .chat-header-bar { display: none; }
            body.chat-active #messages, body.chat-active #input-area, body.chat-active .chat-header-bar { display: flex; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

    <div id="main-screen">
        <div class="wa-header">
            <h2>Chats</h2>
            <div class="wa-header-icons">
                <span class="icon-btn" title="Refresh" onclick="location.reload()">↻</span>
                <span class="icon-btn" onclick="openModal('profileModal')">⚙️</span>
                <span class="icon-btn" onclick="window.location.href='/logout'">🚪</span>
            </div>
        </div>

        <div class="wa-search-container">
            <div class="wa-search-box">
                <span>🔍</span>
                <input type="text" id="localSearch" placeholder="Search chats..." onkeyup="filterLocalChats()">
            </div>
        </div>

        <div id="content-area">
            <div id="requestsListContainer" style="display:none;">
                <div class="list-section-title">New Requests</div>
                <div id="requestsList"></div>
            </div>
            
            <div class="list-section-title" id="chatTitleSection">All Messages</div>
            <div id="friendsList"></div>
        </div>

        <div id="coming-soon-view">
            <span style="font-size: 40px; margin-bottom: 15px;">🚧</span>
            <h3>Coming Soon</h3>
            <p style="font-size: 14px;">This feature is in beta.</p>
        </div>

        <div class="fab" onclick="openModal('addUserModal')">
            <span>+</span>
        </div>

        <div id="bottom-nav">
            <div class="nav-item active" onclick="switchTab('chats', this)">
                <div class="nav-icon">💬</div>
                <div class="nav-text">Chats</div>
            </div>
            <div class="nav-item" onclick="switchTab('updates', this)">
                <div class="nav-icon">🔄</div>
                <div class="nav-text">Updates</div>
            </div>
            <div class="nav-item" onclick="switchTab('communities', this)">
                <div class="nav-icon">👥</div>
                <div class="nav-text">Groups</div>
            </div>
            <div class="nav-item" onclick="switchTab('calls', this)">
                <div class="nav-icon">📞</div>
                <div class="nav-text">Calls</div>
            </div>
        </div>
    </div>


    <div id="desktop-empty">
        <div class="empty-icon">💬</div>
        <h2>Secure Chat Web</h2>
        <p>Send and receive messages with end-to-end encryption.</p>
        <div class="badge">🔒 24h Auto-Delete Active</div>
    </div>


    <div id="chat-screen">
        <div class="chat-header-bar">
            <div class="back-btn" onclick="closeChat()">&#8592;</div>
            <div id="chat-header-content" style="display: flex; align-items: center; flex: 1; gap: 15px;">
                <div class="wa-avatar" id="chatAvatar" style="width: 42px; height: 42px; font-size: 16px; border-radius: 12px; display: none;"></div>
                <div class="chat-header-info">
                    <span class="chat-header-name" id="chatTitle">Select a user</span>
                    <span class="chat-header-sub" id="typingIndicator"></span>
                </div>
                <div class="icon-btn" style="font-size: 20px; cursor: pointer;" onclick="location.reload()">↻</div>
            </div>
        </div>
        
        <div id="messages"></div>
        
        <div id="input-area">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImageBeforeSend(event)">
            <input type="text" id="msgInput" placeholder="Type a secure message..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>


    <div class="modal-overlay" id="addUserModal">
        <div class="modal-box">
            <h3>Add Contact</h3>
            <input type="text" id="apiSearchUsername" placeholder="Enter exact username..." autocomplete="off">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('addUserModal')">Cancel</button>
                <button class="btn-save" onclick="searchUserAPI()">Add User</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-box">
            <h3>Edit Profile</h3>
            <div style="text-align: center; margin-bottom: 20px;">
                <div class="wa-avatar" id="editProfilePic" style="width: 86px; height: 86px; border-radius: 24px; margin: 0 auto; font-size: 32px; cursor: pointer;" onclick="document.getElementById('profilePicInput').click()"></div>
                <input type="file" id="profilePicInput" accept="image/*" style="display: none;" onchange="handleProfilePicChange(event)">
                <small style="color: var(--accent); display:block; margin-top:10px; font-weight: 500;">Tap to change photo</small>
            </div>
            <input type="text" id="editNameInput" placeholder="Your Display Name">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('profileModal')">Cancel</button>
                <button class="btn-save" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="imagePreviewModal">
        <div class="modal-box">
            <h3>Send Photo</h3>
            <img id="previewImg" src="" alt="Preview">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cancelImageSend()">Cancel</button>
                <button class="btn-save" onclick="confirmSendImage()">Send Securely</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="lightboxModal" onclick="closeModal('lightboxModal')">
        <img id="lightboxImg" src="" alt="Full Screen">
    </div>

    <script>
        const socket = io();
        let myId = null;
        let currentChatFriendId = null;
        let typingTimeout = null;
        let pendingImageBase64 = null; 
        let myCurrentPic = '';

        // Modal Utility Functions for smooth animation
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }
        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function switchTab(tabName, element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if(tabName === 'chats') {
                document.getElementById('content-area').style.display = 'flex';
                document.getElementById('coming-soon-view').style.display = 'none';
                document.querySelector('.fab').style.display = 'flex'; 
            } else {
                document.getElementById('content-area').style.display = 'none';
                document.getElementById('coming-soon-view').style.display = 'flex';
                document.querySelector('.fab').style.display = 'none'; 
            }
        }

        async function loadData() {
            const res = await fetch('/get_friends');
            const data = await res.json();
            myId = data.my_id;
            myCurrentPic = data.my_pic;
            
            document.getElementById('editNameInput').value = data.my_name;
            setAvatar('editProfilePic', data.my_pic, data.my_name);

            const reqListContainer = document.getElementById('requestsListContainer');
            const reqList = document.getElementById('requestsList');
            reqList.innerHTML = '';
            if(data.requests.length > 0) {
                reqListContainer.style.display = 'block';
                data.requests.forEach(req => {
                    reqList.innerHTML += `
                    <div class="wa-item">
                        <div class="wa-avatar">${req.name.charAt(0)}</div>
                        <div class="wa-item-details">
                            <div class="wa-item-header">
                                <span class="wa-name">${req.name}</span>
                            </div>
                            <div class="wa-last-msg">
                                <span>Wants to connect...</span>
                                <button class="req-btn" onclick="acceptRequest(${req.id})">Accept</button>
                            </div>
                        </div>
                    </div>`;
                });
            } else {
                reqListContainer.style.display = 'none';
            }

            const friendList = document.getElementById('friendsList');
            friendList.innerHTML = '';
            
            let myAvatarStyle = data.my_pic ? `background-image: url('${data.my_pic}'); color: transparent;` : '';
            friendList.innerHTML += `
                <div class="wa-item" onclick="openChat(${myId}, '${data.my_name}', '${data.my_username}', '${data.my_pic}')" id="friend-box-${myId}">
                    <div class="wa-avatar" style="${myAvatarStyle}">${data.my_pic ? '' : data.my_name.charAt(0)}</div>
                    <div class="wa-item-details">
                        <div class="wa-item-header">
                            <span class="wa-name">${data.my_name} (You)</span>
                            <span class="wa-time">📌</span>
                        </div>
                        <div class="wa-last-msg">
                            <span>Saved Messages</span>
                        </div>
                    </div>
                </div>`;

            data.friends.forEach(f => {
                let statusClass = f.is_online ? 'status-dot online' : 'status-dot';
                let avatarStyle = f.pic && f.pic !== 'null' ? `background-image: url('${f.pic}'); color: transparent;` : '';
                let avatarText = f.pic && f.pic !== 'null' ? '' : f.name.charAt(0);

                friendList.innerHTML += `
                <div class="wa-item friend-chat-item" data-name="${f.name.toLowerCase()}" id="friend-box-${f.id}" onclick="openChat(${f.id}, '${f.name}', '${f.username}', '${f.pic}')">
                    <div class="wa-avatar" style="${avatarStyle}">
                        ${avatarText}
                        <div class="${statusClass}" id="status-${f.id}"></div>
                    </div>
                    <div class="wa-item-details">
                        <div class="wa-item-header">
                            <span class="wa-name">${f.name}</span>
                        </div>
                        <div class="wa-last-msg">
                            <span>@${f.username}</span>
                        </div>
                    </div>
                </div>`;
            });
        }

        function setAvatar(elementId, picBase64, name) {
            const el = document.getElementById(elementId);
            if(picBase64 && picBase64 !== 'null') {
                el.style.backgroundImage = `url('${picBase64}')`;
                el.innerText = '';
            } else {
                el.style.backgroundImage = 'none';
                el.innerText = name ? name.charAt(0) : '';
            }
        }

        function filterLocalChats() {
            let input = document.getElementById('localSearch').value.toLowerCase();
            let items = document.getElementsByClassName('friend-chat-item');
            for(let i=0; i<items.length; i++) {
                let name = items[i].getAttribute('data-name');
                if(name.includes(input)) {
                    items[i].style.display = 'flex';
                } else {
                    items[i].style.display = 'none';
                }
            }
        }

        async function searchUserAPI() {
            const username = document.getElementById('apiSearchUsername').value;
            if(!username) return;
            const res = await fetch('/search_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username}) });
            const data = await res.json();
            
            if(res.ok) {
                if(confirm(`Send request to ${data.name}?`)) {
                    await fetch('/send_request', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({receiver_id: data.id}) });
                    alert("Request sent!");
                    closeModal('addUserModal');
                    document.getElementById('apiSearchUsername').value = '';
                }
            } else { alert(data.error); }
        }

        function handleProfilePicChange(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    myCurrentPic = e.target.result;
                    setAvatar('editProfilePic', myCurrentPic, document.getElementById('editNameInput').value);
                };
                reader.readAsDataURL(file);
            }
        }

        async function saveProfile() {
            const newName = document.getElementById('editNameInput').value;
            await fetch('/api/update_profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: newName, profile_pic: myCurrentPic})
            });
            closeModal('profileModal');
            loadData(); 
        }

        async function acceptRequest(reqId) {
            await fetch('/accept_request', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({request_id: reqId}) });
            loadData();
        }

        async function openChat(friendId, friendName, friendUsername, friendPic) {
            currentChatFriendId = friendId;
            
            // Highlight active chat in list
            document.querySelectorAll('.wa-item').forEach(el => el.classList.remove('active-chat'));
            const activeBox = document.getElementById(`friend-box-${friendId}`);
            if(activeBox) activeBox.classList.add('active-chat');

            document.getElementById('chatTitle').innerText = friendName;
            document.getElementById('typingIndicator').innerText = `@${friendUsername}`;
            
            const chatAvatar = document.getElementById('chatAvatar');
            chatAvatar.style.display = 'flex';
            setAvatar('chatAvatar', friendPic === 'null' ? null : friendPic, friendName);
            
            document.body.classList.add('chat-active');
            
            socket.emit('join_private', {friend_id: friendId});

            const res = await fetch(`/get_messages/${friendId}`);
            const messages = await res.json();
            
            const msgBox = document.getElementById('messages');
            msgBox.innerHTML = '';
            messages.forEach(m => appendMessage(m.text, m.time, m.sender_id === myId));
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function closeChat() {
            document.body.classList.remove('chat-active');
            currentChatFriendId = null;
            document.querySelectorAll('.wa-item').forEach(el => el.classList.remove('active-chat'));
        }

        socket.on('user_status_change', function(data) {
            const statusIndicator = document.getElementById(`status-${data.user_id}`);
            if(statusIndicator) {
                if(data.status === 'online') statusIndicator.className = 'status-dot online';
                else statusIndicator.className = 'status-dot';
            }
        });

        document.getElementById("msgInput").addEventListener("input", function() {
            if(currentChatFriendId) socket.emit('typing', { friend_id: currentChatFriendId });
        });

        socket.on('display_typing', function(data) {
            if(data.sender_id === currentChatFriendId) {
                const indicator = document.getElementById('typingIndicator');
                indicator.innerText = "typing...";
                indicator.style.color = "var(--accent)";
                
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { 
                    indicator.innerText = "online"; 
                    indicator.style.color = "var(--text-muted)";
                }, 2000);
            }
        });

        function previewImageBeforeSend(event) {
            const file = event.target.files[0];
            if (file && currentChatFriendId) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    pendingImageBase64 = e.target.result;
                    document.getElementById('previewImg').src = pendingImageBase64;
                    openModal('imagePreviewModal');
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }

        function cancelImageSend() {
            pendingImageBase64 = null;
            closeModal('imagePreviewModal');
        }

        function confirmSendImage() {
            if(pendingImageBase64 && currentChatFriendId) {
                socket.emit('private_message', { friend_id: currentChatFriendId, msg: pendingImageBase64 });
                cancelImageSend();
            }
        }

        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            openModal('lightboxModal');
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value;
            if(text.trim() !== "" && currentChatFriendId) {
                socket.emit('private_message', { friend_id: currentChatFriendId, msg: text });
                input.value = '';
            }
        }

        socket.on('receive_message', function(data) {
            if(data.sender_id === currentChatFriendId || data.sender_id === myId) {
                appendMessage(data.text, data.time, data.sender_id === myId);
                if(data.sender_id === currentChatFriendId) {
                    const indicator = document.getElementById('typingIndicator');
                    indicator.innerText = "online";
                    indicator.style.color = "var(--text-muted)";
                }
            }
        });

        function appendMessage(text, time, isMine) {
            const msgBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = isMine ? 'msg my-msg' : 'msg friend-msg';
            
            if(text.startsWith('data:image/')) {
                div.innerHTML = `<img src="${text}" alt="Image" onclick="openLightbox('${text}')"><span class="time">${time}</span>`;
            } else {
                div.innerHTML = `${text} <span class="time">${time}</span>`;
            }
            
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        document.getElementById("msgInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        loadData();
    </script>
</body>
</html>
